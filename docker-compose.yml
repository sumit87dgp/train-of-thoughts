services:
  postgres:
    image: postgres:16-alpine
    container_name: tot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tot
      POSTGRES_USER: tot_owner
      POSTGRES_PASSWORD: ${TOT_OWNER_PASSWORD:-tot_owner_dev}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - tot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tot_owner -d tot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tot_pg_data:
