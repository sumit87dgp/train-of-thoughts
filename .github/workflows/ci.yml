name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tot
          POSTGRES_USER: tot_owner
          POSTGRES_PASSWORD: tot_owner_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tot_owner -d tot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://tot_owner:tot_owner_dev@localhost:5432/tot?sslmode=disable
      DATABASE_URL_API: postgres://tot_api:tot_api_dev@localhost:5432/tot?sslmode=disable
      CORS_ORIGINS: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - name: Run migrations
        run: |
          chmod +x tot-db/scripts/migrate.sh
          ./tot-db/scripts/migrate.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        working-directory: tot-backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run backend tests
        working-directory: tot-backend
        run: pytest -v

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: tot-frontend/.nvmrc
          cache: npm
          cache-dependency-path: tot-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: tot-frontend
        run: npm ci

      - name: Build frontend
        working-directory: tot-frontend
        run: npm run build
